<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Road Rush</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: monospace;
    color: #fff;
    overflow: hidden;
  }
  h1 { font-size: 1.4rem; letter-spacing: 4px; color: #f0c040; margin-bottom: 10px; text-transform: uppercase; }
  #hud { display: flex; gap: 30px; margin-bottom: 8px; font-size: 0.95rem; color: #aaa; }
  #hud span { color: #fff; font-weight: bold; }
  canvas { border: 2px solid #333; display: block; max-width: 100vw; }
  #msg { margin-top: 14px; font-size: 0.9rem; color: #f0c040; letter-spacing: 2px; height: 20px; }
  #controls { margin-top: 8px; font-size: 0.7rem; color: #555; }
  #credit { margin-top: 6px; font-size: 0.65rem; color: #333; letter-spacing: 1px; }
</style>
</head>
<body>

<h1>Road Rush</h1>
<div id="hud">Score: <span id="score">0</span> &nbsp; High: <span id="hi">0</span> &nbsp; Lives: <span id="lives">3</span></div>
<canvas id="c"></canvas>
<div id="msg">Tap to Start</div>
<div id="controls">← → Arrow Keys / Tap Left-Right to steer</div>
<div id="credit">DEVELOPED BY SAMPANNA STUDIO</div>

<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');

const SIZE = Math.min(window.innerWidth, window.innerHeight * 0.75, 400);
c.width = SIZE;
c.height = Math.round(SIZE * 1.55);
const W = c.width, H = c.height;

const ROAD_LEFT = W * 0.17;
const ROAD_RIGHT = W * 0.83;
const ROAD_W = ROAD_RIGHT - ROAD_LEFT;
const LANE_W = ROAD_W / 3;
const LANES = [ROAD_LEFT+LANE_W*0.5, ROAD_LEFT+LANE_W*1.5, ROAD_LEFT+LANE_W*2.5];

let state='idle', score=0, hi=0, lives=3, speed=3, frameCount=0;
let playerLane=1, playerY=H-H*0.18, shifting=false, shiftX=0, targetX=0;
let roadOffset=0, enemies=[], particles=[], flash=0;
let moveLeft=false, moveRight=false;
const laneX = l => LANES[l];

function spawnEnemy(){
  const lane = Math.floor(Math.random()*3);
  const colors = ['#e74c3c','#3498db','#2ecc71','#e67e22','#9b59b6'];
  enemies.push({ lane, x:laneX(lane), y:-80, color:colors[Math.floor(Math.random()*colors.length)] });
}

function drawRoad(){
  ctx.fillStyle='#1a3a1a'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#2c2c2c'; ctx.fillRect(ROAD_LEFT,0,ROAD_W,H);
  ctx.strokeStyle='#555'; ctx.lineWidth=4;
  ctx.beginPath(); ctx.moveTo(ROAD_LEFT,0); ctx.lineTo(ROAD_LEFT,H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ROAD_RIGHT,0); ctx.lineTo(ROAD_RIGHT,H); ctx.stroke();
  ctx.strokeStyle='#f0c040'; ctx.lineWidth=2;
  ctx.setLineDash([30,20]); ctx.lineDashOffset=-(roadOffset%50);
  for(let i=1;i<3;i++){
    const x=ROAD_LEFT+LANE_W*i;
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
  }
  ctx.setLineDash([]);
}

function drawCar(x,y,color,isPlayer){
  const w=LANE_W*0.6, h=w*1.75;
  const cx=x-w/2, cy=y-h/2;
  ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fillRect(cx+3,cy+3,w,h);
  ctx.fillStyle=color; ctx.beginPath(); ctx.roundRect(cx,cy,w,h,6); ctx.fill();
  ctx.fillStyle=isPlayer?'rgba(100,200,255,0.7)':'rgba(80,80,80,0.8)';
  ctx.beginPath(); ctx.roundRect(cx+w*0.15,cy+(isPlayer?h*0.18:h*0.1),w*0.7,h*0.22,3); ctx.fill();
  ctx.fillStyle='#111';
  [[cx-3,cy+h*0.1],[cx+w-5,cy+h*0.1],[cx-3,cy+h*0.72],[cx+w-5,cy+h*0.72]].forEach(([wx,wy])=>{
    ctx.fillRect(wx,wy,8,12);
  });
  if(isPlayer){
    ctx.fillStyle='#ff4444';
    ctx.fillRect(cx+4,cy+h-6,10,5); ctx.fillRect(cx+w-14,cy+h-6,10,5);
  } else {
    ctx.fillStyle='#ffee88';
    ctx.fillRect(cx+4,cy+2,10,5); ctx.fillRect(cx+w-14,cy+2,10,5);
  }
}

function drawParticles(){
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    ctx.globalAlpha=p.life/p.maxLife; ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    p.x+=p.vx; p.y+=p.vy; p.r*=0.93; p.life--;
  });
  ctx.globalAlpha=1;
}

function explode(x,y){
  for(let i=0;i<30;i++){
    const a=Math.random()*Math.PI*2, s=1+Math.random()*4;
    particles.push({
      x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s,
      r:3+Math.random()*5, life:30+Math.random()*20, maxLife:50,
      color:['#f0c040','#e74c3c','#fff','#ff8800'][Math.floor(Math.random()*4)]
    });
  }
}

function checkCollision(px,py){
  const w=LANE_W*0.6, h=w*1.75;
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    if(Math.abs(px-e.x)<w*0.8 && Math.abs(py-e.y)<h*0.8){
      explode(e.x,e.y); enemies.splice(i,1); return true;
    }
  }
  return false;
}

function update(){
  if(state!=='playing') return;
  frameCount++; roadOffset+=speed;
  score+=Math.floor(speed/3);
  document.getElementById('score').textContent=score;
  if(frameCount%300===0) speed=Math.min(speed+0.5,12);
  const spawnRate=Math.max(60-Math.floor(speed*4),25);
  if(frameCount%spawnRate===0) spawnEnemy();
  enemies.forEach(e=>e.y+=speed);
  enemies=enemies.filter(e=>e.y<H+80);
  if(!shifting){
    if(moveLeft&&playerLane>0){ playerLane--; shifting=true; }
    else if(moveRight&&playerLane<2){ playerLane++; shifting=true; }
  }
  if(shifting){
    targetX=laneX(playerLane);
    const dx=targetX-shiftX;
    shiftX+=dx*0.2;
    if(Math.abs(dx)<1){ shiftX=targetX; shifting=false; }
  } else { shiftX=laneX(playerLane); }
  if(flash<=0&&checkCollision(shiftX,playerY)){
    lives--; flash=60;
    document.getElementById('lives').textContent=lives;
    if(lives<=0){
      state='dead';
      document.getElementById('msg').textContent='GAME OVER — Tap to Retry';
      hi=Math.max(hi,score);
      document.getElementById('hi').textContent=hi;
    }
  }
  if(flash>0) flash--;
}

function draw(){
  ctx.clearRect(0,0,W,H);
  drawRoad(); drawParticles();
  enemies.forEach(e=>drawCar(e.x,e.y,e.color,false));
  if(flash>0&&Math.floor(flash/5)%2===0) ctx.globalAlpha=0.4;
  drawCar(shiftX,playerY,'#00ccff',true);
  ctx.globalAlpha=1;
  if(state==='idle'){
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#f0c040';
    ctx.font='bold '+Math.round(W*0.07)+'px monospace';
    ctx.textAlign='center';
    ctx.fillText('TAP TO START',W/2,H/2);
  }
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }

function startGame(){
  state='playing'; score=0; lives=3; speed=3; frameCount=0;
  playerLane=1; shiftX=laneX(1); shifting=false;
  enemies=[]; particles=[]; flash=0;
  document.getElementById('score').textContent=0;
  document.getElementById('lives').textContent=3;
  document.getElementById('msg').textContent='';
}

document.addEventListener('keydown', e=>{
  if(e.code==='ArrowLeft') moveLeft=true;
  if(e.code==='ArrowRight') moveRight=true;
  if(e.code==='Space'&&state!=='playing') startGame();
});
document.addEventListener('keyup', e=>{
  if(e.code==='ArrowLeft') moveLeft=false;
  if(e.code==='ArrowRight') moveRight=false;
});

let touchStartX=0;
c.addEventListener('touchstart', e=>{
  touchStartX=e.touches[0].clientX;
  if(state!=='playing') startGame();
},{passive:true});
c.addEventListener('touchend', e=>{
  const dx=e.changedTouches[0].clientX-touchStartX;
  if(dx<-20){ moveLeft=true; setTimeout(()=>moveLeft=false,100); }
  if(dx>20){ moveRight=true; setTimeout(()=>moveRight=false,100); }
},{passive:true});

shiftX=laneX(playerLane);
loop();
</script>
</body>
</html>
